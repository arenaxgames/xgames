<html lang="fr">
<head>
<meta charset="UTF-8">

<title>X-Games · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000814;--s1:#0a0f1e;--s2:#0d1530;--s3:#111827;--cyan:#00f5ff;--blue:#4361ee;--violet:#7209b7;--pink:#f72585;--gold:#ffd60a;--green:#06d6a0;--red:#ff006e;--orange:#ff9f1c;--txt:#f0f4ff;--dim:#8896b3;--dim2:#a0aec0}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.01) 2px,rgba(0,245,255,.01) 4px);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(114,9,183,.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(67,97,238,.1) 0%,transparent 50%);pointer-events:none;z-index:0}

/* LOGIN */
#loginScr{position:fixed;inset:0;z-index:9000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
.login-logo{font-family:'Orbitron',monospace;font-size:1.7rem;font-weight:900;color:var(--cyan);text-shadow:0 0 28px var(--cyan);letter-spacing:.1em;text-align:center}
.login-sub{font-size:.68rem;color:var(--dim);letter-spacing:.2em;text-transform:uppercase}
.login-box{background:linear-gradient(135deg,rgba(10,15,30,.95),rgba(13,21,48,.95));border:1px solid rgba(0,245,255,.15);border-radius:18px;padding:26px 22px;width:100%;max-width:340px}
.login-lbl{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:7px;display:block}
.login-inp{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(0,245,255,.15);border-radius:10px;color:var(--txt);font-size:1rem;padding:11px 14px;outline:none;font-family:'Rajdhani',sans-serif;margin-bottom:14px;transition:border-color .2s}
.login-inp:focus{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,245,255,.1)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:10px;color:#000;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;padding:12px;cursor:pointer;letter-spacing:.08em}
.login-btn:active{opacity:.8}
.login-err{font-size:.76rem;color:var(--red);text-align:center;min-height:16px;margin-top:8px}

/* APP SHELL */
#adm{position:relative;z-index:1;display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:rgba(10,15,30,.97);border-bottom:1px solid rgba(0,245,255,.08);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.topbar-logo{font-family:'Orbitron',monospace;font-size:.95rem;font-weight:900;color:var(--cyan);text-shadow:0 0 12px var(--cyan);letter-spacing:.08em}
.topbar-logo b{color:var(--pink);font-weight:inherit}
.tb-badge{font-size:.58rem;color:var(--green);background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.2);border-radius:20px;padding:3px 9px;letter-spacing:.1em}
.logout{background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:7px;color:var(--dim);font-size:.68rem;padding:5px 10px;cursor:pointer;font-family:'Rajdhani',sans-serif}

/* TABS */
.tabs{display:flex;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(0,245,255,.07);overflow-x:auto;padding:0 10px;gap:2px}
.tab{padding:11px 14px;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;background:transparent;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;font-family:'Rajdhani',sans-serif;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px 13px 40px}

/* SECTION TITLE */
.st{font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,245,255,.75);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,245,255,.25),transparent)}

/* CARDS */
.card{background:linear-gradient(135deg,rgba(10,15,30,.95),rgba(13,21,48,.95));border:1px solid rgba(0,245,255,.15);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,.4),transparent)}

/* INPUTS */
.lbl{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block;font-weight:600}
.inp{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(0,245,255,.15);border-radius:9px;color:var(--txt);font-size:1rem;padding:10px 13px;outline:none;font-family:'Rajdhani',sans-serif;transition:border-color .2s;margin-bottom:10px}
.inp:focus{border-color:var(--cyan)}
.inp-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.inp-row .inp{margin-bottom:0;flex:1}
.inp-sm{width:80px;flex-shrink:0}

/* BUTTONS */
.btn{padding:10px 16px;border:none;border-radius:9px;font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:all .2s}
.btn:active{opacity:.7;transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#000}
.btn-green{background:rgba(6,214,160,.15);border:1px solid rgba(6,214,160,.3);color:var(--green)}
.btn-red{background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.2);color:var(--red)}
.btn-gold{background:linear-gradient(135deg,rgba(255,214,10,.2),rgba(255,159,28,.2));border:1px solid rgba(255,214,10,.3);color:var(--gold)}
.btn-gold:active{background:rgba(255,214,10,.3)}
@keyframes scan-line{0%{top:0;opacity:1}50%{opacity:.8}100%{top:calc(100% - 2px);opacity:1}}
@keyframes badge-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
@keyframes alert-flash{from{opacity:.85}to{opacity:1}}
@keyframes alert-shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
@keyframes ticker-scroll{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.btn-violet{background:rgba(114,9,183,.2);border:1px solid rgba(114,9,183,.3);color:var(--violet)}
.btn-full{width:100%;display:block;text-align:center;padding:12px}
.btn-sm{padding:6px 12px;font-size:.6rem}

/* FEEDBACK */
.fb{font-size:.76rem;padding:7px 11px;border-radius:8px;margin-top:8px;display:none;text-align:center}
.fb.ok{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.2);color:var(--green);display:block}
.fb.err{background:rgba(255,0,110,.1);border:1px solid rgba(255,0,110,.2);color:var(--red);display:block}

/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row .inp{margin-bottom:0}

/* CLIENT ROW */
.cl-row{background:rgba(10,15,30,.85);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.cl-row:active,.cl-row.sel{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.05)}
.cl-top{display:flex;align-items:center;gap:10px}
.cl-av{font-size:1.3rem;flex-shrink:0}
.cl-name{flex:1;font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.cl-xp{font-family:'Orbitron',monospace;font-size:.85rem;color:var(--cyan);font-weight:700;flex-shrink:0}
.cl-id{font-size:.68rem;color:var(--dim);margin-top:2px}
.cl-bar{margin-top:8px;height:5px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden}
.cl-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .5s}

/* DETAIL */
.detail-box{background:rgba(0,245,255,.03);border:1px solid rgba(0,245,255,.15);border-radius:14px;padding:16px;margin-bottom:12px;display:none}
.detail-box.on{display:block}
.det-hdr{display:flex;align-items:center;gap:13px;margin-bottom:14px;padding-bottom:13px;border-bottom:1px solid rgba(0,245,255,.07)}
.det-av{font-size:2.2rem}
.det-info{flex:1}
.det-name{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700}
.det-id{font-size:.62rem;color:var(--dim);margin-top:3px}
.det-xp{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;color:var(--cyan);text-shadow:0 0 18px var(--cyan)}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctrl-btn{padding:11px 8px;border:none;border-radius:11px;font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.ctrl-btn .ci{font-size:1.2rem}
.ctrl-btn:active{transform:scale(.96);opacity:.8}
.ctrl-add{background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.2);color:var(--cyan)}
.ctrl-rem{background:rgba(255,0,110,.08);border:1px solid rgba(255,0,110,.18);color:var(--red)}
.ctrl-slot{background:rgba(255,214,10,.08);border:1px solid rgba(255,214,10,.2);color:var(--gold)}
.ctrl-qr{background:rgba(6,214,160,.08);border:1px solid rgba(6,214,160,.2);color:var(--green)}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset{background:rgba(0,0,0,.4);border:1px solid rgba(0,245,255,.1);border-radius:7px;color:var(--dim2);font-size:.7rem;padding:5px 11px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600}
.preset.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,245,255,.07)}
.xp-preview{font-size:.68rem;color:var(--cyan);text-align:center;margin-bottom:10px;min-height:18px}

/* PENDING SLOTS */
.pending-row{background:rgba(255,214,10,.06);border:1px solid rgba(255,214,10,.2);border-radius:11px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.pr-info{flex:1}
.pr-name{font-size:.85rem;font-weight:700;color:var(--gold)}
.pr-time{font-size:.62rem;color:var(--dim)}
.pr-btns{display:flex;gap:6px}

/* TIERS CONFIG */
.tier-row{background:rgba(0,0,0,.4);border:1px solid rgba(0,245,255,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tier-row .inp{margin:0;flex:1}
.tier-row .inp-sm{margin:0;width:70px}

/* COUPONS VALIDATION */
.cpv-row{background:rgba(10,15,30,.8);border:1px solid rgba(255,159,28,.15);border-radius:11px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.cpv-icon{font-size:1.3rem;flex-shrink:0}
.cpv-info{flex:1;min-width:0}
.cpv-name{font-size:.82rem;font-weight:700}
.cpv-client{font-size:.63rem;color:var(--dim)}
.cpv-status{font-size:.6rem;font-family:'Orbitron',monospace;padding:3px 9px;border-radius:20px;flex-shrink:0}
.cpv-status.active{background:rgba(0,245,255,.1);color:var(--cyan);border:1px solid rgba(0,245,255,.18)}

/* QR MODAL */
#qrModal{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
#qrModal.on{display:flex}
.qr-box{background:rgba(10,15,30,.97);border:1px solid rgba(0,245,255,.2);border-radius:20px;padding:22px;text-align:center;width:100%;max-width:310px}
.qr-t{font-family:'Orbitron',monospace;font-size:.78rem;color:var(--cyan);letter-spacing:.12em;margin-bottom:4px}
.qr-s{font-size:.68rem;color:var(--dim);margin-bottom:14px}
#qrCvs{border-radius:10px;display:block;margin:0 auto}
.qr-btns{display:flex;gap:8px;margin-top:14px;justify-content:center}
.qr-dl{background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;border-radius:8px;color:#000;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;padding:8px 16px;cursor:pointer}
.qr-cl{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--dim);font-size:.65rem;padding:7px 14px;cursor:pointer;font-family:'Rajdhani',sans-serif}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-c{background:rgba(10,15,30,.8);border:1px solid rgba(0,245,255,.08);border-radius:13px;padding:13px;text-align:center}
.stat-v{font-family:'Orbitron',monospace;font-size:1.35rem;font-weight:900;margin-bottom:3px}
.stat-l{font-size:.6rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.toggle-lbl{font-size:.78rem;color:var(--txt)}
.toggle{width:44px;height:24px;background:rgba(0,0,0,.5);border:1px solid rgba(0,245,255,.15);border-radius:12px;cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:rgba(0,245,255,.2);border-color:var(--cyan)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--dim);top:2px;left:2px;transition:all .2s}
.toggle.on::after{background:var(--cyan);left:22px;box-shadow:0 0 8px var(--cyan)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(10,15,30,.97);border:1px solid rgba(0,245,255,.2);border-radius:18px;padding:7px 18px;font-size:.74rem;color:var(--green);pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap}
#toast.on{transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty-s{text-align:center;padding:36px 16px;color:var(--dim);font-size:.78rem}
.empty-si{font-size:2rem;margin-bottom:8px}
</style>
</head>

  <div class="tabs">
    <button class="tab on" data-t="clients">🎮 Clients</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, setDoc, updateDoc, getDoc, getDocs, addDoc, onSnapshot, query, orderBy, where, limit, serverTimestamp, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ════════════════════════════════════
// 🔧 COLLE TA CONFIG FIREBASE ICI
// (même que register.html et client.html)
// ════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAvI3WYc4kM3VbQ8otzq0fraMCQDR7OJc0",
  authDomain: "xgames-loyalty.firebaseapp.com",
  projectId: "xgames-loyalty",
  storageBucket: "xgames-loyalty.firebasestorage.app",
  messagingSenderId: "1082099112233",
  appId: "1:1082099112233:web:bf52d043621ba76061bf38"
};
// ════════════════════════════════════

// ⚠️ CHANGE CE MOT DE PASSE
const ADMIN_PWD = "xgames2024";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allClients = [];
let config = { tiers: [], jackpot: { winRate: 20, prizes: ['Partie gratuite','Peluche','Bonbon géant'] }, sumupLink: '', slotPrice: '2€', cashEnabled: false };
let curTab = 'clients';
let selClientId = null;
let selEuros = null;
let toastT;

// ── LOGIN ──
// ── SW CLEANUP ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwdInp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const v = document.getElementById('pwdInp').value;
  if (v === ADMIN_PWD) {
    document.getElementById('loginScr').style.display = 'none';
    document.getElementById('adm').style.display = 'flex';
    // Demande permission notifications pour les alertes jackpot
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    initAdmin();
  } else {
    document.getElementById('loginErr').textContent = 'Mot de passe incorrect';
    document.getElementById('pwdInp').value = '';
    setTimeout(() => document.getElementById('loginErr').textContent = '', 3000);
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  document.getElementById('adm').style.display = 'none';
  document.getElementById('loginScr').style.display = 'flex';
});

function initAdmin() {
  // Load config
  onSnapshot(doc(db, 'config', 'main'), snap => {
    if (snap.exists()) config = { ...config, ...snap.data() };
    // Met à jour le bandeau défilant
    if (config.bandeau) {
      const ticker = document.getElementById('tickerContent');
      if (ticker) ticker.textContent = config.bandeau;
    }
    if (curTab === 'config') renderTab('config');
  });
  // Load clients
  onSnapshot(query(collection(db, 'clients')), snap => {
    allClients = snap.docs
      .map(d => ({ ...d.data(), _id: d.id }))
      .sort((a,b) => {
        const lvlDiff = (b.level||0) - (a.level||0);
        return lvlDiff !== 0 ? lvlDiff : (b.xp||0) - (a.xp||0);
      });
    if (curTab === 'clients') renderTab('clients');
    if (curTab === 'stats') renderTab('stats');
  });
  // Listen slots
  onSnapshot(query(collection(db, 'slots'), where('status', '==', 'pending')), snap => {
    const prev = (window._pendingSlots || []).length;
    window._pendingSlots = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
    const curr = window._pendingSlots.length;

    // Bannière d'alerte — visible sur TOUS les onglets
    const banner = document.getElementById('jackpotAlert');
    if (banner) {
      if (curr > 0) {
        banner.style.display = 'flex';
        const names = window._pendingSlots.map(s => s.clientPseudo || '?').join(', ');
        document.getElementById('jackpotAlertTxt').textContent =
          curr === 1
            ? `${window._pendingSlots[0]?.clientPseudo || 'Un joueur'} attend ta validation`
            : `${curr} joueurs en attente : ${names}`;
      } else {
        banner.style.display = 'none';
      }
    }

    // Badge sur l'onglet 🎰
    const slotTab = document.getElementById('slotsTab');
    if (slotTab) {
      slotTab.innerHTML = curr > 0
        ? `🎰 Jackpot <span style="background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:.6rem;margin-left:4px;animation:badge-pulse 1s ease-in-out infinite">${curr}</span>`
        : '🎰 Jackpot';
    }

    // Son + notif système si nouvelle demande
    if (curr > prev) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [440, 550, 660].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, ctx.currentTime + i*0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.3);
          osc.start(ctx.currentTime + i*0.15);
          osc.stop(ctx.currentTime + i*0.15 + 0.3);
        });
      } catch(e) {}
      if (Notification.permission === 'granted') {
        new Notification('🎰 X-Games — Demande jackpot !', {
          body: `${window._pendingSlots[curr-1]?.clientPseudo || 'Un joueur'} veut jouer !`,
          icon: './icon-192.png'
        });
      }
    }

    if (curTab === 'slots') renderTab('slots');
  });

  // Handle QR scan from URL
  handleScanFromURL();

  // Listener avis
  onSnapshot(query(collection(db, 'avis'), orderBy('createdAt', 'desc')), snap => {
    window._allAvis = snap.docs.map(d => ({...d.data(), _id: d.id}));
    if (curTab === 'avis') renderTab('avis');
    // Badge sur l'onglet
    const pending = window._allAvis.filter(a => !a.approved).length;
    const tab = document.querySelector('[data-t=avis]');
    if (tab) tab.innerHTML = pending > 0
      ? `⭐ Avis <span style="background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:.6rem;margin-left:4px">${pending}</span>`
      : '⭐ Avis';
  });

  renderTab('clients');
}

async function addXP(id) {
  const euros  = parseFloat(document.getElementById('euroInp')?.value) || 0;
  const xpToAdd = Math.floor(euros); // 1€ = 1 XP
  if (xpToAdd <= 0) { showDetFb('Entre un montant valide', 'err'); return; }

  const cl = allClients.find(x => x._id === id);
  if (!cl) return;

  const sortedTiers = [...(config.tiers||[])].sort((a,b) => a.xp - b.xp);
  const maxXP = sortedTiers.length ? sortedTiers[sortedTiers.length-1].xp : 100;

  let curXP  = cl.xp || 0;
  let curLevel = cl.level || 0;
  let cycles = 0;
  const newCoupons = [];
  let simXP = curXP;
  let remaining = xpToAdd;

  while (remaining > 0) {
    const spaceLeft = maxXP - simXP;
    if (remaining >= spaceLeft) {
      // Franchit tous les paliers restants de ce cycle
      sortedTiers.filter(t => t.xp > simXP && t.xp <= maxXP).forEach((t, idx) => {
        newCoupons.push({
          id: `cp-${Date.now()}-${t.xp}-${idx}-${cycles}`,
          type: 'xp', name: t.name, icon: t.icon || '🎁',
          used: false, earnedAt: new Date().toLocaleDateString('fr-FR')
        });
      });
      remaining -= spaceLeft;
      simXP = 0;
      cycles++;
      curLevel++;
    } else {
      // Paliers franchis dans ce cycle partiel
      sortedTiers.filter(t => t.xp > simXP && t.xp <= simXP + remaining).forEach((t, idx) => {
        newCoupons.push({
          id: `cp-${Date.now()}-${t.xp}-${idx}`,
          type: 'xp', name: t.name, icon: t.icon || '🎁',
          used: false, earnedAt: new Date().toLocaleDateString('fr-FR')
        });
      });
      simXP += remaining;
      remaining = 0;
    }
  }

  const newXP = simXP;

  // Lecture fraîche des coupons
  const freshSnap = await getDoc(doc(db, 'clients', id));
  const existing  = freshSnap.data()?.coupons || [];
  const merged    = [...existing, ...newCoupons];

  try {
    await updateDoc(doc(db, 'clients', id), {
      xp: newXP,
      level: curLevel,
      totalEuros: (cl.totalEuros || 0) + euros,
      coupons: merged,
      updatedAt: serverTimestamp()
    });

    await addDoc(collection(db, 'clients', id, 'history'), {
      type: 'add',
      label: `+${xpToAdd} XP (${euros}€)${cycles > 0 ? ` · ${cycles} niveau(x) gagné(s)` : ''}`,
      euros, xp: xpToAdd, timestamp: serverTimestamp()
    });
    await addDoc(collection(db, 'logs'), {
      type: 'add', clientId: id, clientName: cl.pseudo,
      euros, xp: xpToAdd, timestamp: serverTimestamp()
    });

    let msg = `✓ +${xpToAdd} XP — Total : ${newXP} XP`;
    if (cycles > 0) msg += ` · 🎖️ Niveau ${curLevel} !`;
    if (newCoupons.length) msg += ` · ${newCoupons.length} coupon(s)`;

    showDetFb(msg, 'ok');
    document.getElementById('euroInp').value = '';
    document.querySelectorAll('.preset').forEach(x => x.classList.remove('on'));
    toast(`+${xpToAdd} XP pour ${cl.pseudo}`);
  } catch(e) { showDetFb('Erreur : ' + e.message, 'err'); }
}

async function removeXP(id) {
  const cl = allClients.find(x => x._id === id);
  if (!cl || (cl.xp||0) <= 0) { showDetFb('Déjà à 0 XP', 'err'); return; }
  await updateDoc(doc(db, 'clients', id), { xp: Math.max(0, (cl.xp||0)-1), updatedAt: serverTimestamp() });
  await addDoc(collection(db, 'clients', id, 'history'), { type:'add', label:'-1 XP (correction)', xp:-1, timestamp: serverTimestamp() });
  showDetFb(`✓ -1 XP — Total : ${Math.max(0,(cl.xp||0)-1)} XP`, 'ok');
  toast(`-1 XP pour ${cl.pseudo}`);
}

      <p style="font-size:.74rem;color:var(--dim);line-height:1.6;margin-bottom:14px">

      video.srcObject = scanStream;
      video.play();
      scanLoop(video);
    } catch(e) {
      showScanFb('Caméra non accessible : ' + e.message, 'err');
      stopScan();
    }
  }

  function stopScan() {
    if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
    clearInterval(scanTimer);
    document.getElementById('scanContainer').style.display = 'none';
    document.getElementById('startScanBtn').style.display  = 'flex';
  }

  function scanLoop(video) {
    // Use BarcodeDetector if available (Chrome/Android), fallback to jsQR
    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      scanTimer = setInterval(async () => {
        try {
          const codes = await detector.detect(video);
          if (codes.length > 0) { stopScan(); handleScanResult(codes[0].rawValue); }
        } catch {}
      }, 300);
    } else {
      // Fallback: draw frame to canvas and decode
      const cvs = document.createElement('canvas');
      const ctx = cvs.getContext('2d');
      scanTimer = setInterval(() => {
        if (!video.videoWidth) return;
        cvs.width  = video.videoWidth;
        cvs.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        // Try to find QR via URL pattern in title (simplified)
        // For full decode we'd need jsQR — use a basic URL check
        const imageData = ctx.getImageData(0, 0, cvs.width, cvs.height);
        // Import jsQR dynamically
        import('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js').then(m => {
          const result = (m.default || window.jsQR)(imageData.data, imageData.width, imageData.height);
          if (result?.data) { stopScan(); handleScanResult(result.data); }
        }).catch(() => {});
      }, 400);
    }
  }

  async function handleScanResult(url) {
    showScanFb('QR détecté…', 'ok');
    try {
      const u      = new URL(url);
      const token  = u.searchParams.get('token');
      const cpName = decodeURIComponent(u.searchParams.get('coupon') || '');
      const cpIcon = decodeURIComponent(u.searchParams.get('icon')   || '🎁');
      const clId   = u.searchParams.get('client');

      if (!token) { showScanFb('QR invalide', 'err'); return; }

      // Charge le document de validation
      const validSnap = await getDoc(doc(db, 'validations', token));
      if (!validSnap.exists()) { showScanFb('Coupon introuvable ou expiré', 'err'); return; }
      const v = validSnap.data();
      if (v.validated)         { showScanFb('Coupon déjà utilisé', 'err'); return; }
      if (v.expiresAt < Date.now()) { showScanFb('QR expiré — le client doit en générer un nouveau', 'err'); return; }

      // Valide
      await setDoc(doc(db, 'validations', token), { ...v, validated: true, validatedAt: serverTimestamp() });
      await addDoc(collection(db, 'logs'), {
        type: 'coupon_used', clientId: clId, clientName: v.pseudo,
        couponName: v.couponName, timestamp: serverTimestamp()
      });

      showScanFb(`✓ Coupon validé pour ${v.pseudo} : ${cpIcon} ${cpName}`, 'ok');
      toast(`✓ ${v.pseudo} — ${cpName}`);
    } catch(e) {
      showScanFb('Erreur : ' + e.message, 'err');
    }
  }

  function showScanFb(msg, type) {
    const fb = document.getElementById('scanFb');
    if (!fb) return;
    fb.className = 'fb ' + type; fb.textContent = msg;
    if (type === 'ok') setTimeout(() => { if(fb) fb.className = 'fb'; }, 6000);
  }

  // ── PENDING VALIDATIONS LIVE ──
  onSnapshot(collection(db, 'validations'), snap => {
    const box = document.getElementById('pendingValidations');
    if (!box) return;
    const pending = snap.docs
      .map(d => ({ ...d.data(), _id: d.id }))
      .filter(v => !v.validated && v.expiresAt > Date.now());

    if (!pending.length) {
      box.innerHTML = '<div class="empty-s" style="padding:14px"><div class="empty-si" style="font-size:1.5rem">✅</div><span style="font-size:.75rem">Aucun coupon en attente</span></div>';
      return;
    }

    box.innerHTML = pending.map(v => `
      <div style="background:rgba(255,214,10,.04);border:1px solid rgba(255,214,10,.18);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
        <div style="font-size:1.6rem">${v.couponIcon||'🎁'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.84rem;font-weight:700">${v.pseudo}</div>
          <div style="font-size:.7rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.couponName}</div>
          <div style="font-size:.6rem;color:var(--dim);margin-top:2px">${Math.max(0,Math.round((v.expiresAt-Date.now())/1000))}s restantes</div>
        </div>
        <button class="btn btn-green btn-sm" data-tok="${v._id}" data-pseudo="${v.pseudo}" data-cpname="${v.couponName}" data-clid="${v.clientId}">✓ Valider</button>
      </div>`).join('');

    box.querySelectorAll('[data-tok]').forEach(b => {
      b.addEventListener('click', async () => {
        const vSnap = await getDoc(doc(db, 'validations', b.dataset.tok));
        if (!vSnap.exists()) return;
        await setDoc(doc(db, 'validations', b.dataset.tok), { ...vSnap.data(), validated: true, validatedAt: serverTimestamp() });
        await addDoc(collection(db, 'logs'), { type:'coupon_used', clientId:b.dataset.clid, clientName:b.dataset.pseudo, couponName:b.dataset.cpname, timestamp:serverTimestamp() });
        toast(`✓ Validé pour ${b.dataset.pseudo}`);
      });
    });
  });

  // ── MANUEL PAR PSEUDO ──
  document.getElementById('cpSearch').addEventListener('click', () => {
    const pseudo = document.getElementById('cpPseudo').value.trim();
    const cl = allClients.find(x => x.pseudo?.toLowerCase() === pseudo.toLowerCase());
    const res = document.getElementById('cpResults');
    if (!cl) { res.innerHTML = '<div class="empty-s"><div class="empty-si">❌</div>Client introuvable</div>'; return; }
    const active = (cl.coupons||[]).filter(cp => !cp.used);
    if (!active.length) { res.innerHTML = '<div class="empty-s"><div class="empty-si">🎫</div>Aucun coupon actif</div>'; return; }
    res.innerHTML = `<div class="card" style="margin-top:10px">` +
      active.map(cp => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.3)">
          <div style="font-size:1.3rem">${cp.icon||'🎁'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cp.name}</div>
            <div style="font-size:.62rem;color:var(--dim)">Gagné le ${cp.earnedAt||'—'}</div>
          </div>
          <button class="btn btn-green btn-sm" data-cpid="${cp.id}" data-clid="${cl._id}" data-clname="${cl.pseudo}">✓</button>
        </div>`).join('') + `</div>`;

    res.querySelectorAll('[data-cpid]').forEach(b => {
      b.addEventListener('click', async () => {
        const clData = allClients.find(x => x._id === b.dataset.clid);
        if (!clData) return;
        const updated = (clData.coupons||[]).map(cp =>
          cp.id === b.dataset.cpid ? { ...cp, used: true, usedDate: new Date().toLocaleDateString('fr-FR') } : cp
        );
        await updateDoc(doc(db, 'clients', b.dataset.clid), { coupons: updated });
        await addDoc(collection(db, 'logs'), { type:'coupon_used', clientId:b.dataset.clid, clientName:b.dataset.clname, timestamp:serverTimestamp() });
        toast('✓ Coupon validé');
        document.getElementById('cpSearch').click();
      });
    });
  });
  document.getElementById('cpPseudo').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('cpSearch').click(); });
}

// ── GESTION SCAN DEPUIS URL (?scan=1&token=...) ──────────────────
// Si l'admin ouvre l'app via le QR scanné, on traite directement
async function handleScanFromURL() {
  const p = new URLSearchParams(window.location.search);
  window.history.replaceState({}, '', window.location.pathname);

  // Ouverture directe du profil via QR identité client
  const directClientId = p.get('clientId');
  if (directClientId) {
    // Switche sur l'onglet clients et ouvre le profil
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelector('[data-t=clients]')?.classList.add('on');
    curTab = 'clients';
    selClientId = directClientId;
    renderTab('clients');
    toast('Client trouvé via QR code');
    return;
  }

  if (p.get('scan') !== '1') return;
  const token  = p.get('token');
  const pseudo = p.get('client');
  const cpName = decodeURIComponent(p.get('coupon') || '');
  const cpIcon = decodeURIComponent(p.get('icon')   || '🎁');
  if (!token) return;

  // Nettoie l'URL sans rechargement
  window.history.replaceState({}, '', window.location.pathname);

  // On attend que Firebase soit prêt
  // Affiche un prompt de confirmation
  if (!confirm(`Valider le coupon ?\n${cpIcon} ${cpName}`)) return;

  try {
    const validSnap = await getDoc(doc(db, 'validations', token));
    if (!validSnap.exists())    { alert('Coupon introuvable'); return; }
    const v = validSnap.data();
    if (v.validated)            { alert('Coupon déjà utilisé !'); return; }
    if (v.expiresAt < Date.now()){ alert('QR expiré !'); return; }

    await setDoc(doc(db, 'validations', token), { ...v, validated: true, validatedAt: serverTimestamp() });
    await addDoc(collection(db, 'logs'), {
      type: 'coupon_used', clientId: v.clientId, clientName: v.pseudo,
      couponName: v.couponName, timestamp: serverTimestamp()
    });
    toast(`✓ ${v.pseudo} — ${cpName}`);
    alert(`✅ Coupon validé pour ${v.pseudo} !\n${cpIcon} ${cpName}`);
  } catch(e) { alert('Erreur : ' + e.message); }
}

      const icon = typeof p === 'object' ? (p.icon || '🎰') : '🎰';
      return `<div style="background:rgba(255,159,28,.04);border:1px solid rgba(255,159,28,.15);border-radius:11px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px">
        <input class="inp" style="margin:0;font-size:1.1rem;width:44px;text-align:center;padding:6px 4px" value="${icon}" data-prize-icon="${i}" placeholder="🎰">
        <input class="inp" style="margin:0;flex:1" placeholder="Ex: Peluche géante" value="${name}" data-prize-name="${i}">
        <button class="btn btn-red btn-sm" data-prize-del="${i}" style="padding:4px 10px;font-size:.62rem;flex-shrink:0">✕</button>
      </div>`;
    }).join('');

    container.querySelectorAll('[data-prize-name]').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = parseInt(inp.dataset.prizeName);
        if (typeof localPrizes[i] === 'string') localPrizes[i] = { name: inp.value, icon: '🎰' };
        else localPrizes[i].name = inp.value;
      });
    });
    container.querySelectorAll('[data-prize-icon]').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = parseInt(inp.dataset.prizeIcon);
        if (typeof localPrizes[i] === 'string') localPrizes[i] = { name: localPrizes[i], icon: inp.value };
        else localPrizes[i].icon = inp.value;
      });
    });
    container.querySelectorAll('[data-prize-del]').forEach(b => {
      b.addEventListener('click', () => { localPrizes.splice(parseInt(b.dataset.prizeDel),1); rebuildPrizes(); });
    });
  }

  document.getElementById('addPrizeBtn').addEventListener('click', () => {
    localPrizes.push({ name: '', icon: '🎁' });
    rebuildPrizes();
  });

  rebuildPrizes();

  // Win rate slider
  document.getElementById('winRateInp').addEventListener('input', function() {
    document.getElementById('winRateVal').textContent = this.value + '%';
  });

  // Cash toggle
  let cashEnabled = config.cashEnabled || false;
  document.getElementById('cashToggle').addEventListener('click', function() {
    cashEnabled = !cashEnabled;
    this.classList.toggle('on', cashEnabled);
  });

  // Save jackpot
  document.getElementById('saveJackpotBtn').addEventListener('click', async () => {
    const winRateRaw = document.getElementById('winRateInp').value;
    const winRate = winRateRaw === '' ? 20 : parseInt(winRateRaw); // Fix: 0 est valide
    const sumupLink = document.getElementById('sumupInp').value.trim();
    const slotPrice = document.getElementById('priceInp').value.trim();
    // Normalize prizes to objects
    const normalizedPrizes = localPrizes
      .map(p => typeof p === 'string' ? { name: p, icon: '🎰' } : p)
      .filter(p => p.name.trim());
    if (!normalizedPrizes.length) {
      document.getElementById('jackpotFb').className='fb err';
      document.getElementById('jackpotFb').textContent='Ajoute au moins 1 lot jackpot';
      return;
    }
    await setDoc(doc(db,'config','main'), {
      sumupLink, slotPrice, cashEnabled,
      jackpot: { winRate, prizes: normalizedPrizes }
    }, { merge:true });
    document.getElementById('jackpotFb').className='fb ok';
    document.getElementById('jackpotFb').textContent=`✓ Config sauvegardée — ${normalizedPrizes.length} lot(s) jackpot, ${winRate}% de chance`;
    toast('Config jackpot mise à jour');
  });
}

// ═══════════════════════════════════════
// STATS TAB
// ═══════════════════════════════════════
function renderStats(c) {
  const total      = allClients.length;
  const totalXP    = allClients.reduce((s,cl)=>s+(cl.xp||0),0);
  const totalEuros = allClients.reduce((s,cl)=>s+(cl.totalEuros||0),0);
  const withCoupons = allClients.filter(cl=>(cl.coupons||[]).some(cp=>!cp.used)).length;

  // Tri par niveau DESC puis XP DESC
  const sorted = [...allClients].sort((a,b) => {
    const lvlDiff = (b.level||0) - (a.level||0);
    return lvlDiff !== 0 ? lvlDiff : (b.xp||0) - (a.xp||0);
  });
  const top = sorted[0];

  // 10 derniers inscrits
  const recent = [...allClients].sort((a,b) => {
    const ta = a.createdAt?.seconds || 0;
    const tb = b.createdAt?.seconds || 0;
    return tb - ta;
  }).slice(0, 10);

  c.innerHTML = `
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-v" style="color:var(--cyan)">${total}</div><div class="stat-l">Clients</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--gold)">${totalEuros.toFixed(0)}€</div><div class="stat-l">Total dépensé</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--green)">${Math.round(totalXP/(total||1))}</div><div class="stat-l">Moy. XP</div></div>
      <div class="stat-c"><div class="stat-v" style="color:var(--pink)">${withCoupons}</div><div class="stat-l">Coupons actifs</div></div>
    </div>

    ${top ? `<div style="background:rgba(255,214,10,.06);border:1px solid rgba(255,214,10,.18);border-radius:13px;padding:13px;text-align:center;margin-bottom:14px">
      <div style="font-size:.6rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">🏆 Meilleur joueur</div>
      <div style="font-family:'Orbitron',monospace;font-size:.95rem;color:var(--gold)">${top.pseudo}</div>
      <div style="font-size:.72rem;color:var(--dim);margin-top:3px">Niv.${top.level||0} · ${top.xp||0} XP · ${(top.totalEuros||0).toFixed(0)}€</div>
    </div>` : ''}

    <div class="st">10 derniers inscrits</div>
    ${recent.map(cl=>`
      <div style="display:flex;align-items:center;gap:10px;background:rgba(10,15,30,.7);border:1px solid rgba(0,245,255,.08);border-radius:9px;padding:8px 12px;margin-bottom:5px">
        <div style="font-size:1.1rem">${cl.avatar||'🎮'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem;font-weight:700">${cl.pseudo}</div>
          <div style="font-size:.6rem;color:var(--dim)">Niv.${cl.level||0} · ${cl.xp||0} XP · ${(cl.totalEuros||0).toFixed(0)}€</div>
        </div>
        <button class="btn btn-sm" style="background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.15);color:var(--cyan);font-size:.58rem" onclick="selClientId='${cl._id}';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));document.querySelector('[data-t=clients]').classList.add('on');curTab='clients';renderTab('clients')">Voir</button>
      </div>`).join('')}

    <div class="st" style="margin-top:14px">Classement complet</div>
    ${sorted.map((cl,i)=>`
      <div style="display:flex;align-items:center;gap:10px;background:rgba(10,15,30,.7);border:1px solid rgba(0,0,0,.3);border-radius:9px;padding:8px 12px;margin-bottom:6px">
        <div style="font-family:'Orbitron',monospace;font-size:.68rem;color:var(--dim);width:18px">#${i+1}</div>
        <div style="font-size:1.1rem">${cl.avatar||'🎮'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem;font-weight:700">${cl.pseudo}</div>
          <div style="font-size:.6rem;color:var(--dim)">Niv.${cl.level||0} · ${(cl.totalEuros||0).toFixed(0)}€ dépensé</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Orbitron',monospace;font-size:.8rem;color:var(--cyan);font-weight:700">${cl.xp||0} XP</div>
        </div>
        <button class="btn btn-sm" style="background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.15);color:var(--cyan);font-size:.58rem" onclick="showQRById('${cl._id}')">QR</button>
      </div>`).join('')}

    <button class="btn btn-green btn-full" style="margin-top:14px" onclick="exportData()">📥 EXPORTER LES DONNÉES (CSV)</button>`;
}

function renderAvis(c) {
  const all = window._allAvis || [];
  const pending  = all.filter(a => !a.approved);
  const approved = all.filter(a =>  a.approved);
  c.innerHTML = `
    <div class="st">En attente de validation (${pending.length})</div>
    ${pending.length ? pending.map(a => `
      <div style="background:rgba(255,214,10,.06);border:1px solid rgba(255,214,10,.2);border-radius:12px;padding:12px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:1.1rem">${a.avatar||'🎮'}</div>
          <div style="font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700">${a.pseudo||'—'}</div>
          <div style="margin-left:auto">${'⭐'.repeat(a.stars||0)}</div>
        </div>
        ${a.message ? `<div style="font-size:.76rem;color:var(--dim);margin-bottom:8px">"${a.message}"</div>` : ''}
        <div style="display:flex;gap:8px">
          <button class="btn btn-green btn-sm" style="flex:1" onclick="approveAvis('${a._id}')">✅ Publier</button>
          <button class="btn btn-red btn-sm" onclick="deleteAvis('${a._id}')">🗑 Supprimer</button>
        </div>
      </div>`).join('') : '<div class="empty-s"><div class="empty-si">⭐</div>Aucun avis en attente</div>'}
    <div class="st" style="margin-top:14px">Publiés (${approved.length})</div>
    ${approved.map(a => `
      <div style="background:rgba(10,15,30,.7);border:1px solid rgba(0,245,255,.08);border-radius:10px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px">
        <div style="font-size:1rem">${a.avatar||'🎮'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.75rem;font-weight:700">${a.pseudo||'—'} — ${'⭐'.repeat(a.stars||0)}</div>
          ${a.message ? `<div style="font-size:.65rem;color:var(--dim)">"${a.message}"</div>` : ''}
        </div>
        <button class="btn btn-red btn-sm" onclick="deleteAvis('${a._id}')">🗑</button>
      </div>`).join('')}`;
}

window.approveAvis = async (id) => {
  await updateDoc(doc(db,'avis',id), { approved: true });
  toast('Avis publié');
};
window.deleteAvis = async (id) => {
  await deleteDoc(doc(db,'avis',id));
  toast('Avis supprimé');
};

function exportData() {
  const rows = [['Pseudo','Avatar','XP','Niveau','Euros dépensés','Coupons actifs','Date inscription']];
  allClients.forEach(cl => {
    const active = (cl.coupons||[]).filter(c=>!c.used).length;
    const date   = cl.createdAt?.seconds ? new Date(cl.createdAt.seconds*1000).toLocaleDateString('fr-FR') : '—';
    rows.push([cl.pseudo, cl.avatar||'', cl.xp||0, cl.level||0, (cl.totalEuros||0).toFixed(2), active, date]);
  });
  const csv  = rows.map(r => r.join(';')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `xgames-export-${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.csv`;
  a.click();
  toast('Export CSV téléchargé');
}

// ── QR ──
function showQR(cl) {
  const url = `${window.location.origin}/client.html?id=${cl._id}`;
  document.getElementById('qrSub').textContent = `Carte de ${cl.pseudo}`;
  document.getElementById('qrName').textContent = cl.pseudo;
  document.getElementById('qrId').textContent = cl.id || cl._id;
  document.getElementById('qrUrl').textContent = url;
  const cvs = document.getElementById('qrCvs');
  const ctx = cvs.getContext('2d');
  ctx.clearRect(0,0,200,200);
  ctx.fillStyle='#000814'; ctx.fillRect(0,0,200,200);
  const tmp = document.createElement('div');
  new QRCode(tmp, { text:url, width:180, height:180, colorDark:'#00f5ff', colorLight:'#000814', correctLevel:QRCode.CorrectLevel.M });
  setTimeout(() => {
    const img = tmp.querySelector('img') || tmp.querySelector('canvas');
    if (img) { const i=new Image(); i.onload=()=>ctx.drawImage(i,10,10,180,180); i.src=img.tagName==='CANVAS'?img.toDataURL():img.src; }
  }, 300);
  document.getElementById('qrDl').onclick = () => { const a=document.createElement('a'); a.download=`xgames-${cl.pseudo}.png`; a.href=cvs.toDataURL(); a.click(); };
  document.getElementById('qrModal').classList.add('on');
}

window.showQRById = (id) => { const cl=allClients.find(x=>x._id===id); if(cl) showQR(cl); };
document.getElementById('qrModal').addEventListener('click', e => { if(e.target===document.getElementById('qrModal')) document.getElementById('qrModal').classList.remove('on'); });

// ── SCANNER QR CLIENT ──
let qrScanInterval = null;
let qrStream = null;

window.openQRScanner = async function() {
  const box = document.getElementById('qrScannerBox');
  if (!box) return;
  box.style.display = 'block';
  const video = document.getElementById('qrVideo');
  try {
    qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = qrStream;
    video.play();
    if (!window.jsQR) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
      s.onload = startScanLoop;
      document.head.appendChild(s);
    } else {
      startScanLoop();
    }
  } catch(e) {
    document.getElementById('qrScanStatus').textContent = '❌ Caméra non accessible. Vérifie les permissions.';
  }
};

function startScanLoop() {
  const video = document.getElementById('qrVideo');
  const status = document.getElementById('qrScanStatus');
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  qrScanInterval = setInterval(() => {
    if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code && code.data) {
      try {
        const url = new URL(code.data);
        const cId = url.searchParams.get('clientId');
        if (cId) {
          window.closeQRScanner();
          selClientId = cId;
          renderTab('clients');
          toast('✓ Client trouvé !');
        } else {
          if (status) status.textContent = '⚠️ QR non reconnu — utilise le QR identité client';
        }
      } catch(e) {
        if (status) status.textContent = '⚠️ QR invalide';
      }
    }
  }, 300);
}

window.closeQRScanner = function() {
  clearInterval(qrScanInterval);
  qrScanInterval = null;
  if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
  const box = document.getElementById('qrScannerBox');
  if (box) box.style.display = 'none';
};

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ '+msg; t.classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('on'),2000);
}
